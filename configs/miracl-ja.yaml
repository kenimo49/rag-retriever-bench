# MIRACL-ja: Japanese Wikipedia passages + human-annotated dev queries (qrels).
# corpus_size can be overridden per run: rag-retriever-bench run -c ... --corpus-size 10000
dataset:
  name: miracl-ja
  corpus_size: 100000
  split: dev
  seed: 42

embeddings:
  provider: openai
  model: text-embedding-3-small
  dim: 1536
  batch_size: 128
  workers: 8

bench:
  top_k: 10
  warmup_queries: 20

backends:
  - type: pgvector
    label: pgvector (HNSW)
    dsn: postgresql://bench:bench@localhost:5432/bench
    hnsw: { m: 16, ef_construction: 64, ef_search: 100 }

  - type: clickhouse
    label: ClickHouse (HNSW)
    host: localhost
    port: 8123
    index: hnsw
    hnsw: { m: 16, ef_construction: 64, ef_search: 100 }

  - type: clickhouse
    label: ClickHouse (brute force)
    host: localhost
    port: 8123
    index: none
